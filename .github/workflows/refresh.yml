name: Options Data Refresh

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install selenium requests webdriver-manager
      - name: Run Scraper
        env:
          WEBAPP_URL: ${{ secrets.WEBAPP_URL }}
        run: python main.py
